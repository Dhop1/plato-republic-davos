{% extends "base.html" %}
{% block title %}Dialogue - The Republic{% endblock %}

{% block content %}
<div class="chat-container">
    <div class="chat-header">
        <a href="javascript:history.back()" class="btn btn-secondary btn-sm" data-testid="button-back">&larr; Back</a>
        <h2 id="chat-title">Dialogue</h2>
        <span id="chat-badge" class="badge badge-gold" style="display:none;"></span>
    </div>
    <div class="chat-messages" id="messages-area">
        <div class="empty-state" id="chat-empty">
            <div class="empty-icon" style="font-family:var(--font-serif);font-size:2.5rem;color:var(--accent-gold);opacity:0.6;">S</div>
            <p>Begin your dialogue. Ask questions about the uploaded texts, and your AI tutor will guide your understanding.</p>
        </div>
    </div>
    <div class="chat-input-area">
        <input type="text" id="chat-input" class="form-control" placeholder="Ask your question..." data-testid="input-chat-message">
        <button id="send-btn" class="btn btn-primary" data-testid="button-send-message">Send</button>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const CONVO_ID = {{ conversation_id }};
let isLoading = false;

document.addEventListener('DOMContentLoaded', async () => {
    await loadConversation();
    
    document.getElementById('send-btn').addEventListener('click', sendMessage);
    document.getElementById('chat-input').addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            sendMessage();
        }
    });
});

async function loadConversation() {
    const res = await fetch(`/api/conversations/${CONVO_ID}`);
    const convo = await res.json();
    
    document.getElementById('chat-title').textContent = convo.title;
    if (convo.course_id) {
        const courseRes = await fetch(`/api/courses/${convo.course_id}`);
        const course = await courseRes.json();
        const badge = document.getElementById('chat-badge');
        badge.textContent = course.title;
        badge.style.display = 'inline-flex';
    }
    
    const area = document.getElementById('messages-area');
    const empty = document.getElementById('chat-empty');
    
    if (convo.messages && convo.messages.length > 0) {
        empty.style.display = 'none';
        convo.messages.forEach(m => appendMessage(m.role, m.content));
        scrollToBottom();
    }
}

function appendMessage(role, content) {
    const area = document.getElementById('messages-area');
    const empty = document.getElementById('chat-empty');
    empty.style.display = 'none';
    
    const div = document.createElement('div');
    div.className = `message ${role}`;
    
    const avatar = role === 'user' ? 'Y' : 'S';
    
    const formatted = content
        .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.*?)\*/g, '<em>$1</em>')
        .replace(/`(.*?)`/g, '<code style="background:var(--bg-primary);padding:2px 6px;border-radius:3px;font-family:var(--font-mono);font-size:0.85em;">$1</code>')
        .replace(/\n/g, '<br>');
    
    div.innerHTML = `
        <div class="message-avatar">${avatar}</div>
        <div class="message-bubble">${formatted}</div>
    `;
    area.appendChild(div);
}

function scrollToBottom() {
    const area = document.getElementById('messages-area');
    area.scrollTop = area.scrollHeight;
}

async function sendMessage() {
    if (isLoading) return;
    
    const input = document.getElementById('chat-input');
    const content = input.value.trim();
    if (!content) return;
    
    input.value = '';
    isLoading = true;
    
    const sendBtn = document.getElementById('send-btn');
    sendBtn.innerHTML = '<span class="spinner"></span>';
    sendBtn.disabled = true;
    
    appendMessage('user', content);
    scrollToBottom();
    
    try {
        const res = await fetch(`/api/conversations/${CONVO_ID}/messages`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ content })
        });
        
        if (!res.ok) {
            const err = await res.json();
            showToast(err.message || 'Failed to get response', 'error');
            return;
        }
        
        const msg = await res.json();
        appendMessage('model', msg.content);
        scrollToBottom();
    } catch (err) {
        showToast('Failed to send message', 'error');
    } finally {
        isLoading = false;
        sendBtn.innerHTML = 'Send';
        sendBtn.disabled = false;
        input.focus();
    }
}
</script>
{% endblock %}
