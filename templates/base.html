<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="The Republic - Study Plato's masterwork with the DavOS AI tutor.">
    <title>{% block title %}The Republic{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    {% block head %}{% endblock %}
</head>
<body>
    {% block content %}{% endblock %}

    <div id="toast" class="toast"></div>

    <script>
        function showToast(msg, type = 'info') {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast show' + (type === 'error' ? ' error' : '');
            setTimeout(() => { t.className = 'toast'; }, 3000);
        }

        window._currentUser = null;
        (async function loadAuthNav() {
            try {
                const res = await fetch('/api/auth/me');
                const user = await res.json();
                window._currentUser = user;
                const containers = document.querySelectorAll('#nav-auth, #sidebar-auth');
                containers.forEach(el => {
                    if (user) {
                        el.innerHTML =
                            '<a href="/profile" class="nav-auth-link" data-testid="link-profile">' + user.name + '</a>' +
                            '<a href="/logout" class="nav-auth-link" data-testid="link-logout">Sign Out</a>';
                    } else {
                        el.innerHTML =
                            '<a href="/login" class="nav-auth-link" data-testid="link-login">Login</a>' +
                            '<a href="/signup" class="nav-auth-btn" data-testid="link-signup">Join</a>';
                    }
                });
            } catch (e) {}
        })();
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
